{% extends "base.html" %}

{% block title %}Create Post - CodeIT{% endblock %}

{% block content %}
<section class="create-post">
    <p class="terminal-kicker">gard@codeit:~$ touch post.md</p>
    <h1>Create post</h1>

    {% if error %}
        <p class="form-error">{{ error }}</p>
    {% endif %}

    <form method="post" action="{{ url_for('create_post') }}">
        <label>
            Author
            <input name="author" type="text" placeholder="anonymous" value="{{ form_data.get('author', '') }}">
        </label>

        <label>
            Subcodeit
            <input name="subcodeit" type="text" placeholder="/code/react" value="{{ form_data.get('subcodeit', '') }}">
        </label>

        <label>
            Title
            <input name="title" type="text" placeholder="What are you working on?" value="{{ form_data.get('title', '') }}" required>
        </label>

        <label>
            Post type
            <select name="post_type">
                {% for option in ["Question", "Snippet", "Repository", "Bug", "Discussion"] %}
                    <option {% if form_data.get('post_type', 'Discussion') == option %}selected{% endif %}>{{ option }}</option>
                {% endfor %}
            </select>
        </label>

        <label>
            Body
            <textarea name="body" placeholder="Write your post using Markdown..." required>{{ form_data.get('body', '') }}</textarea>
        </label>

        <label>
            Tags
            <input name="tags" type="text" placeholder="react, typescript, frontend" value="{{ form_data.get('tags', '') }}">
        </label>

        <label>
            Code filename
            <input name="code_filename" type="text" placeholder="example.js" value="{{ form_data.get('code_filename', '') }}">
        </label>

        <label>
            Code snippet
            <textarea class="code-input" name="code" placeholder="Paste optional code here...">{{ form_data.get('code', '') }}</textarea>
        </label>

        <button type="submit">Post</button>
    </form>
</section>
{% endblock %}
