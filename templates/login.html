{% extends "base.html" %}

{% block title %}GitHub Login - CodeIT{% endblock %}

{% block content %}
<section class="create-post auth-panel">
    <p class="terminal-kicker">gard@codeit:~$ gh auth login</p>
    <h1>GitHub login</h1>

    {% if error %}
        <div class="form-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('github_login') }}">
        <button type="submit">continue with GitHub</button>
    </form>
</section>
{% endblock %}
