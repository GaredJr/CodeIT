<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}CodeIT{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v=config.ASSET_VERSION) }}">
</head>
<body>
    <header class="topbar">
        <a href="/" class="logo">
            <span class="logo-icon">&gt;_</span>
            <span class="logo-text">CodeIT</span>
        </a>

        <input class="search" type="text" placeholder="grep posts errors repos snippets...">

        <nav class="topnav">
            <a href="/create">./create</a>
            <a href="#">ssh login</a>
        </nav>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <div class="ascii-card">
<pre>+--------+
| CODEIT |
+--------+</pre>
            </div>

            <a href="/">~/home</a>
            <a href="#">~/following</a>
            <a href="#">~/saved</a>

            <div class="sidebar-title">$ cd subcodeits</div>
            <a href="/code/javascript">/code/javascript</a>
            <a href="/code/python">/code/python</a>
            <a href="/code/roblox">/code/roblox</a>
            <a href="/code/react">/code/react</a>
        </aside>

        <main class="main">
            {% block content %}{% endblock %}
        </main>

        <aside class="rightbar">
            <div class="panel">
                <h3>./trending</h3>
                <a href="/code/python">/code/python</a>
                <a href="/code/react">/code/react</a>
                <a href="/code/linux">/code/linux</a>
            </div>
        </aside>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
